<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obra #001 - Marina Benitez</title>
    <style>
        /* Estilo general inspirado en la cerámica artesanal */
        body { 
            font-family: 'Georgia', serif; 
            text-align: center; 
            padding: 40px 20px; 
            background-color: #fdfaf6; /* Crema suave */
            color: #4a4a4a; /* Gris oscuro para el texto general */
        }
        .contenedor { 
            max-width: 500px; 
            margin: auto; 
            border: 1px solid #e2d1c3; 
            padding: 30px; 
            border-radius: 15px; 
            background: white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { 
            color: #8b5e3c; /* Marrón arcilla para el título */
            border-bottom: 1px solid #e2d1c3; 
            padding-bottom: 15px; 
            font-size: 1.5em;
        }
        p { margin: 20px 0; }
        
        /* Botón color arcilla */
        .boton { 
            display: inline-block; 
            padding: 15px 25px; 
            background: #a67c52; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            margin-top: 10px;
            font-weight: bold;
        }
        .boton:hover { background: #8b5e3c; }
        
        .contacto {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #4a4a4a; /* Texto "Sigamos en contacto" en gris oscuro */
        }
        
        /* SOLUCIÓN AL AZUL DESAGRADABLE */
        .link-ig {
            color: #4a4a4a; /* Mismo gris oscuro que el texto, o puedes usar #8b5e3c para marrón */
            text-decoration: underline; /* Mantenemos el subrayado para que se sepa que es link */
            font-weight: bold;
        }
        .link-ig:hover {
            color: #8b5e3c; /* Cambia a marrón cuando pasas el mouse/tocas */
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Vasija Orgánica #001</h1>
        <p>Esta pieza fue creada con arcilla recolectada en la Patagonia y horneada a leña.</p>
        
        <p>Mira el proceso de creación aquí:</p>
        <a href="https://youtube.com" class="boton">Ver Video del Proceso</a>
        
        <div class="contacto">
            <p>Sigamos en contacto:<br>
            <a href="https://instagram.com/marina_art_and_design" class="link-ig">@marina_art_and_design</a></p>
        </div>
    </div>
</body>
</html>
